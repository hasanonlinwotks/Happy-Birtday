<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kashish ❤️ V2</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg"></div>
<div class="confetti"></div>

<section class="hero">
<h1>🎂 Happy Birthday <span>Kashish ❤️</span></h1>
<p>✨ A magical birthday celebration ✨</p>
<button onclick="scrollToWish()">💌 Send Your Wish</button>
</section>

<section class="music glass">
<h2>🎵 Birthday Music</h2>
<audio controls>
<source src="" type="audio/mpeg">
</audio>
<p>Add your MP3 later</p>
</section>

<section class="wish glass" id="wish">
<h2>💖 Send Your Wish</h2>
<input type="text" id="nameInput" placeholder="Your Name">
<textarea id="msgInput" placeholder="Write your wish / shayari"></textarea>
<input type="file" id="fileInput" accept="image/*,video/*">
<div id="preview"></div>
<button onclick="addWish()">🚀 Post Wish</button>
</section>

<section class="wall">
<h2>❤️ Public Wish Wall</h2>
<div id="wall"></div>
</section>

<script src="script.js"></script>
</body>
</html>
